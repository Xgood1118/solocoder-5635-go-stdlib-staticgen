<!DOCTYPE html>
<html lang="{{.Site.Language}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{.Site.Description}}">
    <meta name="keywords" content="{{range $i, $k := .Site.Keywords}}{{if $i}}, {{end}}{{$k}}{{end}}">
    <meta name="author" content="{{.Site.Author}}">

    <title>{{if .PageTitle}}{{.PageTitle}} - {{end}}{{.Site.Title}}</title>

    <link rel="stylesheet" href="{{asset "/css/main.css"}}">
    <link rel="stylesheet" href="{{asset "/css/highlight.css"}}">
    <link rel="alternate" type="application/rss+xml" title="{{.Site.Title}}" href="/index.xml">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <nav class="navbar">
                <a href="/" class="site-title">{{.Site.Title}}</a>
                <ul class="nav-links">
                    <li><a href="/">首页</a></li>
                    <li><a href="/archive/">归档</a></li>
                    <li><a href="/categories/">分类</a></li>
                    <li><a href="/tags/">标签</a></li>
                    <li><a href="/about/">关于</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {{.Content}}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>{{.Site.Copyright}}</p>
            <p class="powered-by">Powered by <strong>staticgen</strong> | Built with Go</p>
        </div>
    </footer>

    <script src="{{asset "/js/main.js"}}"></script>
</body>
</html>
